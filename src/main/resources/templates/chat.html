<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">
<title>Spring Boot Chat Application</title>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:#f4f4f4;
}

.container{

    width:700px;
    margin:40px auto;
    background:white;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

.header{

    background:#2196F3;
    color:white;
    padding:15px;
    text-align:center;
    font-size:24px;

}

.chat-box{

    height:400px;
    overflow-y:auto;
    padding:20px;
    border-bottom:1px solid #ddd;

}

.message{

    margin:10px 0;

}

.sender{

    font-weight:bold;
    color:#2196F3;

}

.input-area{

    padding:20px;

}

input{

    width:100%;
    padding:10px;
    margin-bottom:10px;
    font-size:16px;

}

button{

    width:100%;
    padding:12px;
    background:#2196F3;
    color:white;
    border:none;
    cursor:pointer;
    font-size:18px;

}

button:hover{

    background:#1565C0;

}

</style>

</head>

<body onload="connect()">

	<div class="container">

		<div class="header">Spring Boot Chat</div>

			<div id="chatBox" class="chat-box">

			</div>

		<div class="input-area">

			<input type="text" id="sender" placeholder="Enter Your Name">

			<input type="text" id="content" placeholder="Enter Message">

			<button onclick="sendMessage()">Send</button>

		</div>

	</div>

<script>

let stompClient = null;

function connect(){

    let socket = new SockJS('/ws');

    stompClient = Stomp.over(socket);

    stompClient.connect({},function(frame){

        console.log("Connected : "+frame);

        stompClient.subscribe("/topic/messages",function(message){

            showMessage(JSON.parse(message.body));

        });

    });

}

function sendMessage(){

    let sender = document.getElementById("sender").value;

    let content = document.getElementById("content").value;

    let chatMessage={

        sender:sender,
        content:content

    };

    stompClient.send("/app/sendMessage",{},JSON.stringify(chatMessage));

    document.getElementById("content").value="";

}

function showMessage(message){

    let chat=document.getElementById("chatBox");

    let div=document.createElement("div");

    div.className="message";

    div.textContent=message.sender+":"+message.content;

    chat.appendChild(div);

    chat.scrollTop=chat.scrollHeight;

}

</script>

</body>
</html>
